<div class="fixed bottom-0 left-0 right-0 z-50 flex flex-col items-center pb-8"
     x-on:mouseenter="isHoveringZone = true"
     x-on:mouseleave="isHoveringZone = false"
     :class="{'pointer-events-none': !shouldShowUI && !isHoveringZone}">

    <div class="scrubber-wrapper relative mb-6"
         :class="{'controls-visible': shouldShowUI}"
         x-show="meta.page_count > 0">

        <div class="scrubber-tooltip"
             x-show="isScrubbing || isHoveringScrubber"
             :style="`left: ${(scrubberValue / (meta.page_count - 1)) * 100}%`"
             x-text="parseInt(scrubberValue) + 1">
        </div>

        <input type="range"
               class="scrubber"
               min="0"
               :max="meta.page_count - 1"
               x-model="scrubberValue"
               x-on:mouseenter="isHoveringScrubber = true"
               x-on:mouseleave="isHoveringScrubber = false"
               x-on:mousedown="isScrubbing = true"
               x-on:touchstart="isScrubbing = true"
               x-on:change="$data.finishScrub()"
               x-on:input="$data.updateScrubberUI()">
    </div>

    <div class="reader-controls relative shadow-2xl"
         x-show="meta.page_count > 0"
         :class="{'controls-visible': shouldShowUI}"
         x-on:mouseenter="isHoveringBar = true"
         x-on:mouseleave="isHoveringBar = false">

        <button x-on:click="goToBook(meta.prev_comic_id)" :disabled="!meta.prev_comic_id" class="text-gray-400 hover:text-white disabled:opacity-30">&#9198;</button>
        <button x-on:click="$data.prevPage()" class="text-white hover:text-blue-400 text-2xl px-2">&#9664;</button>

        <div class="flex items-center space-x-2 text-sm font-mono text-gray-300 mx-2">
            <span x-text="currentPage + 1" class="text-white font-bold"></span>
            <span class="text-gray-500">/</span>
            <span x-text="meta.page_count"></span>
        </div>

        <button x-on:click="$data.nextPage()" class="text-white hover:text-blue-400 text-2xl px-2">&#9654;</button>
        <button x-on:click="goToBook(meta.next_comic_id)" :disabled="!meta.next_comic_id" class="text-gray-400 hover:text-white disabled:opacity-30">&#9197;</button>

        <div class="w-px h-6 bg-gray-700 mx-2"></div>

        <select x-model="fitMode" class="bg-transparent text-xs text-gray-400 focus:outline-none cursor-pointer">
            <option value="contain">Fit Screen</option>
            <option value="width">Fit Width</option>
            <option value="height">Fit Height</option>
        </select>
    </div>
</div>
