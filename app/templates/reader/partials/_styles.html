<style>
    body { overflow: hidden; background: #000; }

    [x-cloak] { display: none !important; }

    .reader-container {
        position: fixed; inset: 0;
        background: #000;
        display: flex; flex-direction: column;
        z-index: 100;
        touch-action: pan-y;
        overflow: hidden;
    }

    .reader-container.scroll-mode {
        overflow-y: auto;
        overscroll-behavior-y: contain;
    }

    .reader-toolbar {
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        padding: 0.75rem 1rem;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        z-index: 50;
        transition: transform 0.3s;
        position: sticky;
        top: 0;
    }

    .reader-toolbar.hidden { transform: translateY(-100%); }

    .bookmark-detour-banner {
        position: sticky;
        top: 4.25rem;
        z-index: 45;
        backdrop-filter: blur(10px);
        background: rgba(10, 14, 24, 0.9);
        border-bottom: 1px solid rgba(251, 191, 36, 0.35);
    }

    .reader-content {
        flex: 1; display: flex; align-items: center; justify-content: center;
        overflow: hidden; position: relative;
    }

    .reader-page {
        max-width: 100%; max-height: 100%;
        object-fit: contain;
        user-select: none;
    }

    .reader-scroll-content {
        display: block;
        overflow: visible;
        padding: 1rem 0 9rem;
    }

    .reader-scroll-stack {
        width: min(100%, 1100px);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 0 1rem;
    }

    .reader-scroll-page {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        scroll-margin-top: 4.5rem;
    }

    .reader-scroll-image {
        width: 100%;
        height: auto;
        max-width: 100%;
        object-fit: contain;
        border-radius: 0.25rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        background: rgba(255, 255, 255, 0.02);
    }

    .nav-zone {
        position: absolute; top: 0; bottom: 0; width: 20%; z-index: 20;
        cursor: pointer;
    }

    .nav-zone.left { left: 0; }
    .nav-zone.right { right: 0; }
    .nav-zone:hover { background: linear-gradient(to right, rgba(255,255,255,0.05), transparent); }
    .nav-zone.right:hover { background: linear-gradient(to left, rgba(255,255,255,0.05), transparent); }

    .nav-zone.center {
        left: 20%;
        width: 60%;
        cursor: default;
    }

    .reader-controls {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 0.75rem 1.5rem; border-radius: 9999px;
        display: flex; align-items: center; gap: 1rem;
        opacity: 0; transition: opacity 0.3s, transform 0.3s;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .reader-controls, .scrubber-wrapper {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s, transform 0.3s;
    }

    .controls-visible {
        opacity: 1 !important;
        pointer-events: auto !important;
    }

    .settings-panel {
        position: fixed; top: 4rem; right: 1rem;
        background: rgba(20, 20, 20, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 0.5rem;
        padding: 1rem;
        width: 250px;
        z-index: 60;
        color: white;
    }

    .range-slider {
        width: 100%; height: 4px; background: #4b5563;
        border-radius: 2px; outline: none; -webkit-appearance: none;
    }

    .range-slider::-webkit-slider-thumb {
        -webkit-appearance: none; width: 16px; height: 16px;
        background: #3b82f6; border-radius: 50%; cursor: pointer;
    }

    .scrubber-wrapper {
        width: 90%;
        max-width: 600px;
        height: 20px;
        display: flex; align-items: center;
        z-index: 55;
        opacity: 0; transition: opacity 0.3s;
        pointer-events: auto;
    }

    input[type=range].scrubber {
        -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer;
    }

    input[type=range].scrubber:focus { outline: none; }

    input[type=range].scrubber::-webkit-slider-runnable-track {
        width: 100%; height: 4px; cursor: pointer;
        background: rgba(255,255,255,0.3); border-radius: 2px;
        transition: height 0.2s, background 0.2s;
    }

    .scrubber-wrapper:hover input[type=range].scrubber::-webkit-slider-runnable-track {
        height: 6px; background: rgba(255,255,255,0.5);
    }

    input[type=range].scrubber::-webkit-slider-thumb {
        height: 12px; width: 12px; border-radius: 50%;
        background: #3b82f6; cursor: pointer;
        -webkit-appearance: none;
        margin-top: -4px;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        transition: transform 0.2s;
    }

    .scrubber-wrapper:hover input[type=range].scrubber::-webkit-slider-thumb {
        transform: scale(1.5);
    }

    .scrubber-tooltip {
        position: absolute;
        bottom: 100%;
        margin-bottom: 10px;
        background: #3b82f6;
        color: white;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: bold;
        pointer-events: none;
        transform: translateX(-50%);
        white-space: nowrap;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
</style>
