<div x-show="showBookmarks" x-cloak
     data-bookmarks-modal
     class="fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-100"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     x-on:click.self="closeBookmarks()">

    <div class="w-full max-w-xl rounded-xl border border-gray-700 bg-gray-950/95 shadow-2xl"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="scale-95 opacity-0"
         x-transition:enter-end="scale-100 opacity-100">

        <div class="flex items-start justify-between gap-4 border-b border-gray-800 px-6 py-5">
            <div class="min-w-0">
                <h3 class="text-lg font-bold text-white">Bookmarks</h3>
                <p class="mt-1 text-sm text-gray-400">Save intentional page markers without affecting Continue progress.</p>
            </div>
            <div class="flex items-center gap-3">
                <span x-show="bookmarks.length > 0"
                      class="whitespace-nowrap rounded-full border border-gray-700 bg-gray-900 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-gray-300">
                    <span x-text="bookmarks.length"></span> saved
                </span>
            <button x-on:click="closeBookmarks()" data-close-bookmarks class="rounded p-2 text-gray-400 transition-colors hover:bg-white/10 hover:text-white" title="Close Bookmarks">
                <span class="sr-only">Close bookmarks</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            </div>
        </div>

        <div class="border-b border-gray-800 px-6 py-5">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-end">
                <div class="flex-1">
                    <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-gray-400">Label (Optional)</label>
                    <input x-ref="bookmarkLabelInput"
                           data-bookmark-label-input
                           type="text"
                           maxlength="120"
                           x-model="bookmarkLabelValue"
                           placeholder="Favorite splash page"
                           class="w-full rounded-lg border border-gray-700 bg-gray-900 px-3 py-2 text-sm text-white placeholder:text-gray-500 focus:border-blue-500 focus:outline-none">
                </div>
                <div class="flex items-center justify-between gap-3 sm:flex-col sm:items-end">
                    <span class="rounded-full border border-blue-500/30 bg-blue-500/10 px-3 py-1 text-sm font-semibold text-blue-300">
                        Page <span x-text="currentPage + 1"></span>
                    </span>
                    <button x-on:click="saveBookmark()"
                            data-save-bookmark
                            class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-bold text-white transition-colors hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50"
                            :disabled="isIncognito || isBookmarkBusy || meta.page_count <= 0"
                            x-text="currentBookmark ? 'Update Bookmark' : 'Save Bookmark'">
                    </button>
                </div>
            </div>

            <p x-show="isIncognito" class="mt-3 text-xs text-amber-300">
                Incognito mode is read-only for bookmarks.
            </p>
        </div>

        <div x-show="bookmarks.length > 0" class="border-b border-gray-800 px-6 py-4">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex-1">
                    <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-gray-400">Filter Bookmarks</label>
                    <input type="text"
                           data-bookmark-search
                           x-model="bookmarkSearchQuery"
                           placeholder="Search page number or label"
                           class="w-full rounded-lg border border-gray-700 bg-gray-900 px-3 py-2 text-sm text-white placeholder:text-gray-500 focus:border-blue-500 focus:outline-none">
                </div>
                <p class="text-xs text-gray-500 sm:pt-6">
                    Showing <span x-text="filteredBookmarks.length"></span> of <span x-text="bookmarks.length"></span>
                </p>
            </div>
        </div>

        <div class="overflow-y-auto px-6 py-5" style="max-height:min(26rem, 48vh);">
            <template x-if="bookmarks.length === 0">
                <div class="rounded-xl border border-dashed border-gray-700 px-5 py-10 text-center">
                    <p class="text-sm font-medium text-white">No bookmarks yet.</p>
                    <p class="mt-1 text-sm text-gray-400">Save the current page to keep a reusable jump point.</p>
                </div>
            </template>

            <template x-if="bookmarks.length > 0 && filteredBookmarks.length === 0">
                <div class="rounded-xl border border-dashed border-gray-700 px-5 py-10 text-center">
                    <p class="text-sm font-medium text-white">No bookmarks match that filter.</p>
                    <p class="mt-1 text-sm text-gray-400">Try a page number or part of a label.</p>
                </div>
            </template>

            <div class="space-y-2.5" x-show="filteredBookmarks.length > 0">
                <template x-for="bookmark in filteredBookmarks" :key="bookmark.id">
                    <div data-bookmark-item
                         :data-page-index="bookmark.page_index"
                         class="rounded-xl border border-gray-800 bg-gray-900/80 p-3">
                        <div class="flex items-start gap-3">
                            <div class="min-w-0 flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-bold text-blue-300" x-text="`Page ${bookmark.page_index + 1}`"></span>
                                    <span x-show="bookmark.page_index === currentPage"
                                          class="rounded-full border border-emerald-500/30 bg-emerald-500/10 px-2 py-0.5 text-[11px] font-semibold uppercase tracking-wide text-emerald-300">
                                        Current
                                    </span>
                                </div>

                                <div x-show="editingBookmarkId !== bookmark.id">
                                    <button x-on:click="jumpToBookmark(bookmark.page_index)"
                                            data-jump-bookmark
                                            class="mt-1 block w-full text-left transition-colors hover:text-white">
                                        <p x-show="bookmark.label" x-text="bookmark.label" class="text-sm text-gray-300"></p>
                                        <p x-show="!bookmark.label" class="text-sm text-gray-500">Saved page marker</p>
                                    </button>
                                </div>

                                <div x-show="editingBookmarkId === bookmark.id" class="mt-2 space-y-2">
                                    <input x-ref="bookmarkEditInput"
                                           data-bookmark-edit-input
                                           type="text"
                                           maxlength="120"
                                           x-model="editingBookmarkLabelValue"
                                           x-on:keydown.enter.prevent="saveBookmarkEdit(bookmark.id)"
                                           class="w-full rounded-lg border border-gray-700 bg-gray-950 px-3 py-2 text-sm text-white placeholder:text-gray-500 focus:border-blue-500 focus:outline-none"
                                           placeholder="Add or update a label">
                                    <p class="text-xs text-gray-500">Leave blank to keep an unlabeled bookmark.</p>
                                </div>
                            </div>

                            <div class="flex shrink-0 flex-col gap-2 sm:flex-row">
                                <template x-if="editingBookmarkId !== bookmark.id">
                                    <button x-on:click.stop="startBookmarkEdit(bookmark)"
                                            data-bookmark-edit
                                            class="rounded-lg px-3 py-2 text-xs font-semibold text-gray-300 transition-colors hover:bg-white/10 hover:text-white disabled:cursor-not-allowed disabled:opacity-40"
                                            :disabled="isIncognito || isBookmarkBusy">
                                        Edit
                                    </button>
                                </template>
                                <template x-if="editingBookmarkId === bookmark.id">
                                    <button x-on:click.stop="saveBookmarkEdit(bookmark.id)"
                                            data-bookmark-save-edit
                                            class="rounded-lg bg-blue-600 px-3 py-2 text-xs font-semibold text-white transition-colors hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50"
                                            :disabled="isIncognito || isBookmarkBusy">
                                        Save
                                    </button>
                                </template>
                                <template x-if="editingBookmarkId === bookmark.id">
                                    <button x-on:click.stop="cancelBookmarkEdit()"
                                            data-bookmark-cancel-edit
                                            class="rounded-lg px-3 py-2 text-xs font-semibold text-gray-300 transition-colors hover:bg-white/10 hover:text-white">
                                        Cancel
                                    </button>
                                </template>
                                <button x-on:click.stop="deleteBookmark(bookmark.id)"
                                        data-delete-bookmark
                                        class="rounded-lg px-3 py-2 text-xs font-semibold text-gray-400 transition-colors hover:bg-white/10 hover:text-white disabled:cursor-not-allowed disabled:opacity-40"
                                        :disabled="isIncognito || isBookmarkBusy">
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
